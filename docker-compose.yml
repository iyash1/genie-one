services:
  app:
    build: .
    container_name: local-rag-app
    ports:
      - "7860:7860"
    volumes:
      - .:/app
      - ./db:/app/db
      - ./docs:/app/docs
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: >
      sh -c "ollama serve & sleep 5 && ollama list | grep llama3 || ollama pull llama3 && wait"

volumes:
  ollama_data: